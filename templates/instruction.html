<!DOCTYPE html>
<html lang="EN">
    <head>
        {% set page_meta = meta or {} %}
        <meta charset="UTF-8">
        <title>{{ page_meta.get("title", "Opus.Guide") }}</title>
        <meta name="viewport" content="width=device-width,initial-scale=1"> 
        <meta name="description" content="{{ page_meta.get("description", "View this guide on Opus.Guide") }}">
        <link rel="canonical" href="{{ page_meta.get("url", request.url) }}">
        <meta property="og:title" content="{{ page_meta.get("title", "Opus.Guide") }}">
        <meta property="og:description" content="{{ page_meta.get("description", "View this guide on Opus.Guide") }}">
        <meta property="og:image" content="{{ page_meta.get("image", url_for('static', filename='icon.png', _external=True)) }}">
        <meta property="og:url" content="{{ page_meta.get("url", request.url) }}">
        <meta property="og:type" content="{{ page_meta.get("type", "article") }}">
        <meta property="og:site_name" content="{{ page_meta.get("site_name", "Opus.Guide") }}">
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="{{ page_meta.get("title", "Opus.Guide") }}">
        <meta name="twitter:description" content="{{ page_meta.get("description", "View this guide on Opus.Guide") }}">
        <meta name="twitter:image" content="{{ page_meta.get("image", url_for('static', filename='icon.png', _external=True)) }}">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;400;500;600&display=swap" rel="stylesheet">
        <link rel="shortcut icon" href="{{ url_for('static', filename='icon.png') }}">
        <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='base.css') }}">
        <style type="text/css">




            #finish_button_other{
                margin: auto;
                margin-top: 3vh;
                margin-bottom: 3vh;
            }


            .images_grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                padding: 0px;
                margin: 0px;
            }
            #not_found_div {
                margin-top: 20vh;
                margin-bottom: 20vh;
                text-align: center;
            }

            #toggle-sidebar {
                transition: left 0.4s cubic-bezier(0.25, 1, 0.25, 1), width 0.4s cubic-bezier(0.25, 1, 0.25, 1), transform 0.4s cubic-bezier(0.5, 2, 0.5, 0.5);
                outline: 0;
                transform: scale(1);
                cursor: pointer;
                box-shadow: none;
            }
            #sidebar {
                padding-top: 32px;
                padding-bottom: 32px;
                text-align: left;
                color: var(--brand-primary);

                transition: left 0.4s cubic-bezier(0.25, 1, 0.25, 1), width 0.4s cubic-bezier(0.25, 1, 0.25, 1);
                z-index: 10;
                background: var(--brand-header-background);
                border-right: 1px solid var(--brand-header-border);
                overflow: auto;
                max-width: 23vw;
            }
            .sidebar_item{
                color: var(--brand-primary);
                border-radius: 12px;
                /*border: solid 0.5px gray;*/
                border-right: none;
                border-top-right-radius: 0;
                border-bottom-right-radius: 0;
                margin: 6px;
                margin-right: 0;
                padding: 4px 8px;
                /*padding-right: 16px;
                padding-left: 16px; */
                /*width: %;*/
                font-size: 14px;
            }
            .sidebar_item:hover {
                background-color: rgba(255,255,255,.12);
                cursor: pointer;
            }
            .sidebar_item:active {
                color: var(--brand-primary);
                background-color: rgba(255,255,255,.18);
            }

            #steps_control_div,
            #steps_control_div_bottom {
                line-height: 12px;
                display: grid;
                grid-template-columns: auto 1fr;
                grid-template-areas: "counter control_buttons";
            }
            #counter,
            #counter_bottom {
                grid-area: counter;
            }
            #control_buttons,
            #control_buttons_bottom {
                text-align: right;
                grid-area: control_buttons
            }


            /* main grid stuff*/
            body {
                background: var(--brand-app-background);
                display: grid;
                grid-template-rows: auto 1fr;
                grid-template-columns: auto 1fr;
                grid-template-areas: "header header""sidebar main_grid";
            }

            #header {
                grid-area: header;
            }
            #header_button{
                display: none;
                grid-area: header_button;
            }

            #sidebar {
                grid-area: sidebar;
            }

            #main_grid {
                margin: 0px;
                padding: 1rem;
                background: var(--brand-app-background);
                grid-area: main_grid;
                overflow: auto;
            }
            #content {
                margin: auto;
                padding: 0px;
                max-width: 960px;
            }


            /* Show menu button buttons */
            @media (max-width: 720px) {
                body {
                    grid-template-columns: 50px auto;
                    grid-template-areas: "header_button header""main_grid main_grid";
                }
                .images_grid {
                    grid-template-columns: auto;
                }
                #header_button {
                    display: inline;
                }

                #sidebar {
                    max-width: 100vw;
                    grid-area: main_grid;
                    position: relative;
                    left: -100%;
                }

                #sidebar.collapsed {
                    left: 0%;
                }
                #content {
                    min-height: 115vh;
                }
            }

            #step_content a {
                color: var(--brand-accent) !important;
                text-decoration: underline !important;
            }
            
        </style>
        <!--link rel="stylesheet" href="./style.css"-->
    </head>
    <body>
        <!-- partial:index.partial.html -->

        <!-- header -->
        <div id="header_button" class="header">
            <button class="button" id="toggle-sidebar" ><i class="fa fa-bars"></i></button>
        </div>
        <div id="header" class="header">
            <div class="header_content">
                <div class="header_title_wrapper">
                    <h1 class="header_text">-</h1>
                </div>
                <img id="header_logo" hidden>
            </div>
        </div>

        <!-- sidebar to be populated by javascript -->
        <div id="sidebar">
            <div id="sidebar_div"></div>
        </div>

        <div id="main_grid">
            <div id="content">
                <div id="not_found_div" style="display: none">
                    <h1><i class="fa fa-chain-broken "></i> Page not found<h1>
                    <a href="https://opus.guide" class="link"><i class="fa fa-link icon_left"></i>opus.guide</a>

                </div>


                <div id="steps_control_div" class="no_card" style="display: none">
                    <div id="counter">
                        <h3 id="counter_text"></h3>
                    </div>
                    <div id="control_buttons">
                        <button id="previous_button" class="button" style="display: none"><i class="fa fa-arrow-left"></i></button>
                        <button id="next_button" class="button button_primary" style="display: none"><span id="next_text">Next</span><i class="fa fa-arrow-right icon_right"></i></button>
                        <button id="finish_button" class="button" style="display: none"><i class="fa fa-check icon_left"></i><span id="finish_text">Finish</span></button>
                    </div>

                </div>

                <div id="checklist_panel" class="checklist_panel" style="display: none">
                    <div id="checklist_banner" class="checklist_banner" style="display: none"></div>
                    <div id="checklist_actions" class="checklist_actions">
                        <button id="submit_checklist_button" class="button button_primary" type="button"><i class="fa fa-check icon_left"></i><span>Submit checklist</span></button>
                        <span id="checklist_save_status" class="checklist_save_status"></span>
                    </div>
                </div>

                <div id="step_content">
                    
                </div>
                <div id="steps_control_div_bottom" class="no_card" style="display: none">
                    <div id="counter_bottom">
                        <h3 id="counter_text_bottom"></h3>
                    </div>
                    <div id="control_buttons_bottom">
                        <button id="previous_button_bottom" class="button" style="display: none"><i class="fa fa-arrow-left"></i></button>
                        <button id="next_button_bottom" class="button button_primary" style="display: none"><span id="next_text_bottom">Next</span><i class="fa fa-arrow-right icon_right"></i></button>
                        <button id="finish_button_bottom" class="button" style="display: none"><i class="fa fa-check icon_left"></i><span id="finish_text_bottom">Finish</span></button>
                    </div>
                </div>
                <button id="finish_button_other" class="button" style="display: none"><i class="fa fa-check icon_left"></i><span id="finish_text_other">Finish</span></button>
                <div class="spacer"></div>
                
            </div>
        </div>
        <script src="{{url_for('static', filename='data_script.js')}}"></script>
        <script src="{{url_for('static', filename='script.js')}}"></script>
        <script type="text/javascript">

            {% if checklist_token is defined %}
                get_checklist("{{ checklist_token }}");
            {% elif link_uid is defined %}
                get_instruction("{{ link_uid }}");    
            {% elif role_link is defined %}
                get_instruction_by_role("{{ role_link }}", "{{ instruction_uid }}")
            {% elif process_link is defined %}
                get_instruction_by_process("{{ process_link }}", "{{ instruction_uid }}")
            {% else %}
                get_instruction("")
            {% endif %}
        </script>
    </body>
</html>
