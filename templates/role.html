            #header {
                grid-area: header;
            }
            #main_grid {
                margin: 0px;
                padding: 0px;
                grid-area: main_grid;
                overflow: auto;
            }
            #content {
                margin: auto;
                padding: 0px;
                max-width: 960px;
            }

            @media (max-width: 720px) {
