<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Role</title>
        <meta name="viewport" content="width=device-width,initial-scale=1"> 
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Catamaran:wght@100;200;500&display=swap" rel="stylesheet">
        <link rel="shortcut icon" href="{{ url_for('static', filename='icon.png') }}">
        <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='base.css') }}">
        <style type="text/css">

            /*Buttons */
            .button {
              margin: 4px;
              margin-right: 2px;
              margin-left: 2px;
              border-radius: 12px;
              border: solid 0.5px;
              border-color: black;
              color: black;
              font-size: 14px;
              font-weight: 500;
              padding: 8px 16px;
              min-height: calc(16px + 1.42857143em);
              background: white;
              text-transform: uppercase;
              vertical-align: middle;
              margin: auto;
              margin-top: auto;
              margin-bottom: auto;
            }

            #finish_button_other{
                margin: auto;
                margin-top: 3vh;
                margin-bottom: 3vh;
            }

            .images_grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                padding: 0px;
                margin: 0px;
            }
            #not_found_div {
                margin-top: 20vh;
                margin-bottom: 20vh;
                text-align: center;
            }

            .header {
                line-height: 36px;
                height: auto;
                text-align: left;
                background: white;
                border-bottom: solid 0.5px;
            }
            .header_text{
                padding: 0;
                margin: 4px;
                margin-bottom: -16px;
                margin-left: 1vw;
                margin-right: 1vw;
                font-size: 24px;

            }
            #toggle-sidebar {
                transition: left 0.4s cubic-bezier(0.25, 1, 0.25, 1), width 0.4s cubic-bezier(0.25, 1, 0.25, 1), transform 0.4s cubic-bezier(0.5, 2, 0.5, 0.5);
                outline: 0;
                transform: scale(1);
                cursor: pointer;
            }
            #sidebar {
                padding-top: 32px;
                padding-bottom: 32px;
                text-align: left;
                color: black;

                transition: left 0.4s cubic-bezier(0.25, 1, 0.25, 1), width 0.4s cubic-bezier(0.25, 1, 0.25, 1);
                z-index: 10;
                background: white;
                border-right: solid 0.5px;
                overflow: auto;
                max-width: 23vw;
            }
            .sidebar_item{
                color: black;
                border-radius: 12px;
                border: solid 0.5px gray;
                border-right: none;
                border-top-right-radius: 0;
                border-bottom-right-radius: 0;
                margin: 4px;
                margin-right: 0;
                padding: 4px 8px;
                /*padding-right: 16px;
                padding-left: 16px; */
                /*width: %;*/
                font-size: 18px;
            }
            .sidebar_item:hover {
                background-color: rgba(0,0,0,.08);
                cursor: pointer;
            }
            .sidebar_item:active {
                color: #DD4A48;
                background-color: rgba(153,153,153,0.4);
            }

            #steps_control_div {
                line-height: 12px;
                display: grid;
                grid-template-columns: auto 1fr;
                grid-template-areas: "counter control_buttons";
            }
            #counter {
                grid-area: counter;
            }
            #control_buttons {
                text-align: right;
                grid-area: control_buttons
            }

            .instruction_item {
                display: grid;
                grid-template-columns: 1fr auto;
                grid-template-areas: "instruction_item_text" "instruction_item_button";
            }
            .instruction_item_text {
                grid-area: "instruction_item_text";

            }
            .instruction_item_button {
                grid-area: "instruction_item_button";
            }


            /* main grid stuff*/
            body {
                display: grid;
                grid-template-rows: auto 1fr;
                grid-template-areas: "header""main_grid";
            }

            #header {
                grid-area: header;
            }


            #main_grid {
                margin: 0px;
                padding: 0px;
                grid-area: main_grid;
                overflow: auto;
            }
            #content {
                margin: auto;
                padding: 0px;
                max-width: 960px;
            }

            @media (max-width: 720px) {

                #content {
                    min-height: 115vh;
                }
            }
        </style>
        <!--link rel="stylesheet" href="./style.css"-->
    </head>
    <body>
        <!-- partial:index.partial.html -->

        <!-- header -->
        <div id="header" class="header">
            <!--p>Stuff</p-->
            <h1 class="header_text">Opus●Guide<h1>
        </div>

        <div id="main_grid">
            <div id="content">

                <div id="not_found_div" style="display: none">
                    <h1><i class="fa fa-chain-broken "></i> Page not found<h1>
                    <a href="https://opus.guide" class="link"><i class="fa fa-link icon_left"></i>opus.guide</a>

                </div>


                <div id="instructions_content">
                    <a href="https://link.opus.guide">
                        <div class="card instruction_item">
                            <div class="instruction_item_text">
                                <h3 class="standard_h" >Instructions this is a very long long long long long long long long long long long long long</h3>

                            </div>
                            <div class="instruction_item_button">
                                <button class="button"><i class="fa fa-arrow-right"></i></button>
                            </div>
                        </div>
                    </a>
                </div>

                <div class="spacer"></div>
                
            </div>
        </div>
    </body>
</html>
