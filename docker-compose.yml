services:
  web:
    build: .
    restart: unless-stopped
    expose:
      - "8000"
    networks:
      - webnet

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
    networks:
      - webnet

networks:
  webnet:
